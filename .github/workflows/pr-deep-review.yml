name: PR Deep Review (Layer 3)

# Layer 3: Deep AI review via review-pr.sh + qwen3-coder:480b (Ollama Cloud)
# Best-effort check — continue-on-error so it never blocks a merge
# Manual trigger: /deep-review comment

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches:
      - main
  issue_comment:
    types: [created]

concurrency:
  group: pr-deep-review-${{ github.event.number || github.run_id }}
  cancel-in-progress: true

jobs:
  deep-review:
    name: Deep Review (qwen3-coder:480b)
    runs-on: ubuntu-latest
    continue-on-error: true
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false) ||
      (github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '/deep-review'))
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Get PR number
        id: pr
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
            echo "repo=${{ github.event.repository.name }}" >> $GITHUB_OUTPUT
          else
            echo "number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
            echo "repo=${{ github.event.repository.name }}" >> $GITHUB_OUTPUT
          fi

      - name: Setup hermes wrapper + review script
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_CLOUD_API_KEY }}
          REVIEW_PAT: ${{ secrets.REVIEW_READ_PAT }}
        run: |
          mkdir -p "$HOME/.local/bin"

          if [[ -z "${OLLAMA_API_KEY}" ]]; then
            echo "ERROR: OLLAMA_CLOUD_API_KEY not configured"; exit 1
          fi

          HERMES_BIN="$HOME/.local/bin/hermes"
          if [[ ! -x "$HERMES_BIN" ]] || ! "$HERMES_BIN" --version &>/dev/null 2>&1; then
            printf '%s' "${OLLAMA_API_KEY}" > "$HOME/.local/bin/.ollama_key"
            chmod 600 "$HOME/.local/bin/.ollama_key"
            printf '%s' '' | base64 -d > "$HERMES_BIN"
            chmod +x "$HERMES_BIN"
          fi

          REVIEW_SCRIPT="$HOME/.local/bin/review-pr.sh"
          if [[ ! -x "$REVIEW_SCRIPT" ]]; then
            if [[ -z "${REVIEW_PAT}" ]]; then
              echo "WARN: REVIEW_READ_PAT not configured — cannot download review-pr.sh"; exit 0
            fi
            SCRIPT_CONTENT=$(GH_TOKEN="${REVIEW_PAT}" gh api repos/Allevat-ORX/OnRentX-AI-System/contents/scripts/review-pr.sh --jq '.content' 2>&1)
            if [[ -z "$SCRIPT_CONTENT" ]] || echo "$SCRIPT_CONTENT" | grep -q '"message"'; then
              echo "ERROR: Failed to fetch review-pr.sh: ${SCRIPT_CONTENT:0:200}"; exit 1
            fi
            echo "$SCRIPT_CONTENT" | base64 -d > "$REVIEW_SCRIPT"
            chmod +x "$REVIEW_SCRIPT"
            echo "review-pr.sh downloaded ($(wc -l < "$REVIEW_SCRIPT") lines)"
          fi

      - name: Run deep review (background)
        env:
          GH_TOKEN: ${{ secrets.REVIEW_READ_PAT }}
        run: |
          REVIEW_SCRIPT="$HOME/.local/bin/review-pr.sh"
          PR_NUM="${{ steps.pr.outputs.number }}"
          REPO="${{ steps.pr.outputs.repo }}"
          LOG="/tmp/deep-review-${PR_NUM}.log"
          nohup "$REVIEW_SCRIPT" "$PR_NUM" "$REPO" > "$LOG" 2>&1 &
          echo "PID: $! — review running with qwen3-coder:480b (3-5 min)"
